<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>uk.osric.sim Terrain Lab</title>
    <link rel="stylesheet" href="/styles/tune.css">
</head>
<body>
    <main class="lab-layout">
        <section class="lab-header">
            <p class="kicker">Terrain Lab</p>
            <h1>Raindrop erosion playground</h1>
            <p>Slide the numeric parameters, generate a fresh map, and compare results over time. New renders appear first and older runs stay visible.</p>
        </section>

        <section class="control-shell">
            <form id="tuning-form" class="control-grid">
                <label>
                    <span>Seed</span>
                    <input type="range" id="seed" min="1" max="100000" step="1">
                    <output id="seed-value"></output>
                    <small class="slider-help">Changes the random starting pattern. Use this to compare parameter effects across different terrain seeds.</small>
                </label>
                <label id="size-control">
                    <span>Source size ($2^n + 1$)</span>
                    <input type="range" id="sizePower" min="5" max="9" step="1">
                    <output id="sizePower-value"></output>
                    <small class="slider-help">Chooses only valid diamond-square dimensions: 33, 65, 129, 257, or 513. Larger values increase detail and generation cost.</small>
                </label>
                <label>
                    <span>Erosion passes</span>
                    <input type="range" id="erosionPasses" min="0" max="4000" step="1">
                    <output id="erosionPasses-value"></output>
                    <small class="slider-help">Total number of raindrops to simulate. Higher values carve stronger channels but cost more CPU time.</small>
                </label>
                <label>
                    <span>Drop path length</span>
                    <input type="range" id="dropPathLength" min="4" max="256" step="1">
                    <output id="dropPathLength-value"></output>
                    <small class="slider-help">Maximum downhill steps each raindrop can travel before stopping.</small>
                </label>
                <label>
                    <span>Neighbor sample count</span>
                    <input type="range" id="neighborSampleCount" min="4" max="8" step="4">
                    <output id="neighborSampleCount-value"></output>
                    <small class="slider-help">4-way uses only cardinal neighbors (cheaper). 8-way includes diagonals for more natural drainage.</small>
                </label>
                <label>
                    <span>Erosion strength</span>
                    <input type="range" id="erosionStrength" min="0.001" max="0.100" step="0.001">
                    <output id="erosionStrength-value"></output>
                    <small class="slider-help">Maximum amount removed from a tile each step of a raindrop path.</small>
                </label>
                <label>
                    <span>Deposition ratio</span>
                    <input type="range" id="depositionRatio" min="0.0" max="1.0" step="0.01">
                    <output id="depositionRatio-value"></output>
                    <small class="slider-help">Fraction of eroded material dropped downstream. Higher values fill valleys and soften deep incision.</small>
                </label>
                <div class="action-row">
                    <label class="toggle-inline" for="enable-resize">
                        <input id="enable-resize" type="checkbox">
                        <span>Enable resizing</span>
                    </label>
                    <label class="toggle-inline" for="show-water-overlay">
                        <input id="show-water-overlay" type="checkbox" checked>
                        <span>Show blue water overlay</span>
                    </label>
                    <button id="generate" type="submit">Generate Render</button>
                    <p id="form-status">Loading defaults...</p>
                </div>
            </form>
        </section>

        <section class="renders-shell">
            <div id="render-list" class="render-list"></div>
        </section>
    </main>
    <script src="/scripts/tune.js"></script>
</body>
</html>
